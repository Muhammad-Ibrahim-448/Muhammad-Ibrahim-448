name: Sync Contribution Graph from IbrahimDev-creator

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-contributions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Muhammad-Ibrahim-448 repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Contribution SVG
        uses: Platane/snk@v3
        with:
          github_user_name: IbrahimDev-creator
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Update README with Contribution Graph
        run: |
          cat > README.md << 'EOF'
          # Muhammad-Ibrahim-448

          ## Contribution Graph from IbrahimDev-creator
          
          ### 🟩 Activity Overview
          ![IbrahimDev-creator's Contribution Graph](https://raw.githubusercontent.com/Muhammad-Ibrahim-448/Muhammad-Ibrahim-448/main/dist/github-contribution-grid-snake.svg#gh-light-mode-only)
          ![IbrahimDev-creator's Contribution Graph](https://raw.githubusercontent.com/Muhammad-Ibrahim-448/Muhammad-Ibrahim-448/main/dist/github-contribution-grid-snake-dark.svg#gh-dark-mode-only)
          
          ---
          
          > This contribution graph is automatically synced from [@IbrahimDev-creator](https://github.com/IbrahimDev-creator)
          EOF

      - name: Commit and Push
        run: |
          git config user.name "Muhammad-Ibrahim-448"
          git config user.email "Muhammad-Ibrahim-448@users.noreply.github.com"
          git add README.md dist/
          git diff --quiet && git diff --staged --quiet || git commit -m "🟩 Sync contribution graph from IbrahimDev-creator"
          git push